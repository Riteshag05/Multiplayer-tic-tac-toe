services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 3s
      timeout: 3s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.25.0
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama?sslmode=disable &&
        exec /nakama/nakama --name nakama1 \
          --database.address postgres:localdb@postgres:5432/nakama?sslmode=disable \
          --logger.level INFO \
          --session.token_expiry_sec 7200 \
          --config /nakama/config/local.yml
    volumes:
      - ./nakama/modules:/nakama/data/modules
      - ./nakama/config:/nakama/config
    ports:
      - "7350:7350"
      - "7351:7351"

volumes:
  postgres_data:
